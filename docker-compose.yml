services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - bot_logs:/app/logs
      - bot_exports:/app/exports
    environment:
      POLY_PRIVATE_KEY: ${POLY_PRIVATE_KEY}
      POLY_FUNDER: ${POLY_FUNDER}
      POLY_SIGNATURE_TYPE: ${POLY_SIGNATURE_TYPE:-1}
      POLY_DRY_RUN: ${POLY_DRY_RUN:-true}
      BOT_VERSION: ${BOT_VERSION:-2026-04-15 19:10:00}
      RELAYER_API_KEY: ${RELAYER_API_KEY:-}
      RELAYER_SECRET: ${RELAYER_SECRET:-}
      RELAYER_PASSPHRASE: ${RELAYER_PASSPHRASE:-}
      BOT_LOG_LEVEL: ${BOT_LOG_LEVEL:-INFO}
      BOT_POLL_INTERVAL_SECONDS: ${BOT_POLL_INTERVAL_SECONDS:-1.0}
      BOT_REQUEST_TIMEOUT_SECONDS: ${BOT_REQUEST_TIMEOUT_SECONDS:-10.0}
      BOT_STRATEGY_MODE: ${BOT_STRATEGY_MODE:-paladin}
      BOT_VOLUME_SCALP_SHARES: ${BOT_VOLUME_SCALP_SHARES:-6}
      BOT_VOLUME_SCALP_MAX_ORDERS_PER_SIDE: ${BOT_VOLUME_SCALP_MAX_ORDERS_PER_SIDE:-3}
      BOT_VOLUME_SCALP_ENTRY_MIN_ELAPSED: ${BOT_VOLUME_SCALP_ENTRY_MIN_ELAPSED:-60}
      BOT_VOLUME_SCALP_ENTRY_MAX_ELAPSED: ${BOT_VOLUME_SCALP_ENTRY_MAX_ELAPSED:-840}
      BOT_VOLUME_SCALP_VOLUME_RATIO: ${BOT_VOLUME_SCALP_VOLUME_RATIO:-2.5}
      BOT_VOLUME_SCALP_TP_OFFSET: ${BOT_VOLUME_SCALP_TP_OFFSET:-0.12}
      BOT_VOLUME_SCALP_STOP_OFFSET: ${BOT_VOLUME_SCALP_STOP_OFFSET:-0.05}
      BOT_VOLUME_SCALP_TIME_EXIT_SECONDS_REMAINING: ${BOT_VOLUME_SCALP_TIME_EXIT_SECONDS_REMAINING:-60}
      BOT_SHARES_PER_LEVEL: ${BOT_SHARES_PER_LEVEL:-5}
      BOT_STRATEGY_BUDGET_CAP_USDC: ${BOT_STRATEGY_BUDGET_CAP_USDC:-80.0}
      BOT_STRATEGY_WALLET_RESERVE_USDC: ${BOT_STRATEGY_WALLET_RESERVE_USDC:-0.0}
      BOT_STRATEGY_MIN_BUDGET_USDC: ${BOT_STRATEGY_MIN_BUDGET_USDC:-15.0}
      BOT_STRATEGY_ENTRY_DELAY_SECONDS: ${BOT_STRATEGY_ENTRY_DELAY_SECONDS:-24}
      BOT_STRATEGY_NEW_ORDER_CUTOFF_SECONDS: ${BOT_STRATEGY_NEW_ORDER_CUTOFF_SECONDS:-30}
      BOT_STRATEGY_STALE_ORDER_SECONDS: ${BOT_STRATEGY_STALE_ORDER_SECONDS:-8}
      BOT_FORCE_EXIT_BEFORE_END_SECONDS: ${BOT_FORCE_EXIT_BEFORE_END_SECONDS:-15}
      BOT_POLY_WS_ENABLED: ${BOT_POLY_WS_ENABLED:-true}
      BOT_POLY_WS_URL: ${BOT_POLY_WS_URL:-wss://ws-subscriptions-clob.polymarket.com/ws/market}
      BOT_POLY_FAK_CONFIRM_ORDER: ${BOT_POLY_FAK_CONFIRM_ORDER:-true}
      BOT_PALADIN_PAIR_SUM_MAX: ${BOT_PALADIN_PAIR_SUM_MAX:-1.0}
      BOT_PALADIN_TARGET_MIN_ROI: ${BOT_PALADIN_TARGET_MIN_ROI:-0.05}
      BOT_PALADIN_HEARTBEAT_SEC: ${BOT_PALADIN_HEARTBEAT_SEC:-15.0}
      BOT_PALADIN_STAGGER_PAIR: ${BOT_PALADIN_STAGGER_PAIR:-true}
      BOT_PALADIN_FIRST_LEG_MAX_PX: ${BOT_PALADIN_FIRST_LEG_MAX_PX:-0.55}
      BOT_PALADIN_STAGGER_HEDGE_FORCE_SEC: ${BOT_PALADIN_STAGGER_HEDGE_FORCE_SEC:-45.0}
      BOT_PALADIN_MAX_SHARES_PER_SIDE: ${BOT_PALADIN_MAX_SHARES_PER_SIDE:-40.0}
      BOT_PALADIN_COOLDOWN_SEC: ${BOT_PALADIN_COOLDOWN_SEC:-0.0}
      BOT_PALADIN_DYNAMIC_CLIP_CAP: ${BOT_PALADIN_DYNAMIC_CLIP_CAP:-10.0}

volumes:
  bot_logs:
  bot_exports:
