services:
  bot:
    build:
      # Compose file lives in hostinger-docker/; app sources are one level up (repo root).
      context: ..
      dockerfile: hostinger-docker/Dockerfile
    restart: unless-stopped
    volumes:
      - bot_logs:/app/logs
      - bot_exports:/app/exports
    environment:
      POLY_PRIVATE_KEY: ${POLY_PRIVATE_KEY}
      POLY_FUNDER: ${POLY_FUNDER}
      POLY_SIGNATURE_TYPE: ${POLY_SIGNATURE_TYPE:-1}
      POLY_DRY_RUN: ${POLY_DRY_RUN:-true}
      BOT_VERSION: ${BOT_VERSION:-2026-04-15 19:10:00}
      RELAYER_API_KEY: ${RELAYER_API_KEY:-}
      RELAYER_SECRET: ${RELAYER_SECRET:-}
      RELAYER_PASSPHRASE: ${RELAYER_PASSPHRASE:-}
      BOT_LOG_LEVEL: ${BOT_LOG_LEVEL:-INFO}
      BOT_POLL_INTERVAL_SECONDS: ${BOT_POLL_INTERVAL_SECONDS:-1.0}
      BOT_REQUEST_TIMEOUT_SECONDS: ${BOT_REQUEST_TIMEOUT_SECONDS:-10.0}
      BOT_STRATEGY_MODE: ${BOT_STRATEGY_MODE:-btc_perp15}
      BOT_PERP15_ENTRY_MIN: ${BOT_PERP15_ENTRY_MIN:-0.05}
      BOT_PERP15_ENTRY_MAX: ${BOT_PERP15_ENTRY_MAX:-0.80}
      BOT_PERP15_MONITOR_SECONDS: ${BOT_PERP15_MONITOR_SECONDS:-240}
      BOT_PERP15_SAMPLE_INTERVAL_SECONDS: ${BOT_PERP15_SAMPLE_INTERVAL_SECONDS:-5}
      BOT_PERP15_BTC_TREND_THRESHOLD: ${BOT_PERP15_BTC_TREND_THRESHOLD:-0.0005}
      BOT_PERP15_TP_PRICE: ${BOT_PERP15_TP_PRICE:-0.98}
      BOT_PERP15_END_DUMP_SECONDS_REMAINING: ${BOT_PERP15_END_DUMP_SECONDS_REMAINING:-15}
      BOT_PERP15_MIN_SHARES: ${BOT_PERP15_MIN_SHARES:-6}
      BOT_SHARES_PER_LEVEL: ${BOT_SHARES_PER_LEVEL:-6}
      BOT_STRATEGY_BUDGET_CAP_USDC: ${BOT_STRATEGY_BUDGET_CAP_USDC:-80.0}
      BOT_STRATEGY_WALLET_RESERVE_USDC: ${BOT_STRATEGY_WALLET_RESERVE_USDC:-0.0}
      BOT_STRATEGY_MIN_BUDGET_USDC: ${BOT_STRATEGY_MIN_BUDGET_USDC:-15.0}
      BOT_STRATEGY_ENTRY_DELAY_SECONDS: ${BOT_STRATEGY_ENTRY_DELAY_SECONDS:-35}
      BOT_STRATEGY_NEW_ORDER_CUTOFF_SECONDS: ${BOT_STRATEGY_NEW_ORDER_CUTOFF_SECONDS:-30}
      BOT_FORCE_EXIT_BEFORE_END_SECONDS: ${BOT_FORCE_EXIT_BEFORE_END_SECONDS:-15}

volumes:
  bot_logs:
  bot_exports:
